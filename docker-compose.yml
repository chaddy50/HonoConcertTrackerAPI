services:
  api:
    build: .
    container_name: concert_tracker_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://concert:concert@db:5432/concert_tracker"
    depends_on:
      - db

  db:
    image: postgres:17
    container_name: concert_tracker_database
    restart: unless-stopped
    environment:
      POSTGRES_USER: concert
      POSTGRES_PASSWORD: concert
      POSTGRES_DB: concert_tracker
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
